<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador BIM (That Open) - Funcional</title>
    
    <link rel="icon" href="data:,">

    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; display: block; }
        #loading { 
            position: absolute; top: 50%; width: 100%; text-align: center; 
            color: white; font-size: 18px; pointer-events: none; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            margin-top: 15px; width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <!-- IMPORTMAP CELESTIAL: 
         1. Bloqueamos o esm.sh de mexer no web-ifc (external=web-ifc).
         2. Puxamos o web-ifc puro do jsDelivr para não quebrar o C++. -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three",
                "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.70/+esm",
                "@thatopen/components": "https://esm.sh/@thatopen/components?external=three,web-ifc,@thatopen/fragments",
                "@thatopen/fragments": "https://esm.sh/@thatopen/fragments?external=three,web-ifc"
            }
        }
    </script>
</head>
<body>
    <div id="loading">
        <span id="loading-text">1. Iniciando Motor BIM...</span>
        <div class="spinner" id="spinner"></div>
    </div>
    
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import * as OBC from '@thatopen/components';

        const loadingText = document.getElementById('loading-text');
        const spinner = document.getElementById('spinner');

        async function iniciarAplicacao() {
            try {
                loadingText.innerText = "2. Configurando Cena 3D...";
                const container = document.getElementById('container');
                const components = new OBC.Components();
                const worlds = components.get(OBC.Worlds);
                
                const world = worlds.create();
                world.scene = new OBC.SimpleScene(components);
                world.scene.setup(); 
                world.scene.three.background = new THREE.Color('#cbd5e1');

                world.renderer = new OBC.SimpleRenderer(components, container);
                world.camera = new OBC.SimpleCamera(components);
                world.camera.controls.setLookAt(15, 15, 15, 0, 0, 0);

                // =========================================================
                // O SEGREDO ESTÁ AQUI: REGISTRAR AS FERRAMENTAS ANTES DO INIT!
                // =========================================================
                const fragments = components.get(OBC.FragmentsManager);
                const ifcLoader = components.get(OBC.IfcLoader);

                // Agora sim, damos a ignição. Como as ferramentas foram registradas acima, 
                // o sistema liga todas elas perfeitamente, sem o erro de "initialize fragments first".
                components.init();

                loadingText.innerText = "3. Carregando Tradutor IFC (WASM)...";
                await ifcLoader.setup(); 
                
                ifcLoader.settings.wasm = {
                    path: "https://unpkg.com/web-ifc@0.0.70/",
                    absolute: true
                };

                // LENDO O SEU ARQUIVO IFC
                const fileName = "./meu_projeto.ifc"; // <-- SEU ARQUIVO AQUI

                loadingText.innerText = `4. Baixando o arquivo ${fileName}...`;
                
                // O Date.now() impede o GitHub de usar uma versão velha da memória cache
                const response = await fetch(fileName + "?v=" + Date.now());
                
                if (!response.ok) {
                    throw new Error(`Arquivo IFC não encontrado! Erro ${response.status}. Verifique o nome do arquivo.`);
                }
                
                const data = await response.arrayBuffer();
                const buffer = new Uint8Array(data);

                loadingText.innerText = "5. Convertendo Engenharia para Geometria...";
                
                // Como não "quebramos" o código C++ do web-ifc, isso vai rodar liso
                const model = await ifcLoader.load(buffer);
                world.scene.three.add(model);

                // Faz a câmera viajar até o prédio e centralizá-lo
                world.camera.controls.fitToSphere(model, true);

                // Esconde a tela de carregamento
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error("Erro fatal capturado:", error);
                spinner.style.display = 'none';
                loadingText.innerText = `⚠️ Erro: ${error.message}`;
                loadingText.style.color = "#ff4757";
            }
        }

        iniciarAplicacao();
    </script>
</body>
</html>
