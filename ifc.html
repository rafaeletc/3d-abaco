<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador BIM (That Open) - Versão Final</title>
    <link rel="icon" href="data:,">
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; display: block; }
        #loading { 
            position: absolute; top: 50%; width: 100%; text-align: center; 
            color: white; font-size: 18px; pointer-events: none; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            margin-top: 15px; width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.1",
                "web-ifc": "https://esm.sh/web-ifc@0.0.66",
                "@thatopen/components": "https://esm.sh/@thatopen/components@2.1.0",
                "@thatopen/fragments": "https://esm.sh/@thatopen/fragments@2.1.0"
            }
        }
    </script>
</head>
<body>
    <div id="loading">
        <span id="loading-text">1. Carregando Bibliotecas...</span>
        <div class="spinner" id="spinner"></div>
    </div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import * as OBC from '@thatopen/components';

        const loadingText = document.getElementById('loading-text');

        async function iniciarAplicacao() {
            try {
                const container = document.getElementById('container');
                const components = new OBC.Components();

                // 1. CONFIGURAR O MUNDO
                const worlds = components.get(OBC.Worlds);
                const world = worlds.create();
                world.scene = new OBC.SimpleScene(components);
                world.scene.setup(); 
                world.scene.three.background = new THREE.Color('#cbd5e1');
                world.renderer = new OBC.SimpleRenderer(components, container);
                world.camera = new OBC.SimpleCamera(components);
                
                // 2. INICIALIZAR FRAGMENTOS PRIMEIRO (Resolve o erro "initialize fragments first")
                loadingText.innerText = "2. Inicializando Geometria...";
                const fragments = components.get(OBC.FragmentsManager);
                
                // 3. LIGAR O SISTEMA
                components.init();

                // 4. CONFIGURAR O CARREGADOR DE IFC
                loadingText.innerText = "3. Preparando Tradutor IFC...";
                const ifcLoader = components.get(OBC.IfcLoader);
                await ifcLoader.setup();
                
                // Versão exata do WASM compatível com web-ifc 0.0.66
                ifcLoader.settings.wasm = {
                    path: "https://unpkg.com/web-ifc@0.0.66/",
                    absolute: true
                };

                // 5. CARREGAR O ARQUIVO
                const fileName = "./meu_projeto.ifc"; // Verifique se o nome está correto no GitHub
                loadingText.innerText = `4. Baixando arquivo ${fileName}...`;
                
                const response = await fetch(fileName + "?v=" + Date.now());
                if (!response.ok) throw new Error("Arquivo IFC não encontrado no GitHub.");
                
                const data = await response.arrayBuffer();
                const buffer = new Uint8Array(data);

                loadingText.innerText = "5. Renderizando Modelo...";
                const model = await ifcLoader.load(buffer);
                world.scene.three.add(model);

                // Centraliza o modelo
                world.camera.controls.fitToSphere(model, true);
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error("Erro capturado:", error);
                document.getElementById('spinner').style.display = 'none';
                loadingText.innerText = `⚠️ Erro: ${error.message}`;
                loadingText.style.color = "#ff4757";
            }
        }

        iniciarAplicacao();
    </script>
</body>
</html>
