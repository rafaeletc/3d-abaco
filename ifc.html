<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Visualizador BIM (IFC) - Corrigido</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; font-family: sans-serif;}
        canvas { display: block; }
        #loading { position: absolute; top: 50%; width: 100%; text-align: center; color: white; font-size: 20px;}
    </style>
    
    <!-- TROCAMOS DE UNPKG PARA JSDELIVR (Mais seguro contra erros de MIME Type) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Carregando Cena 3D...</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // Importando o Carregador de IFC
        import { IFCLoader } from 'three/addons/loaders/IFCLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#cbd5e1');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 10, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const orbit = new OrbitControls(camera, renderer.domElement);
        orbit.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // -------------------------------------------------------------
        // CONFIGURAÇÃO DO IFCLOADER COM O NOVO SERVIDOR (JSDELIVR)
        // -------------------------------------------------------------
        const ifcLoader = new IFCLoader();
        
        // Os arquivos WASM são o "motor" que traduz o IFC. 
        ifcLoader.ifcManager.setWasmPath('https://cdn.jsdelivr.net/npm/web-ifc@0.0.50/');

        // Tenta carregar o seu arquivo. 
        // IMPORTANTE: O arquivo .ifc deve estar na mesma pasta do seu index.html
        ifcLoader.load(
            'meu_projeto.ifc', // <--- COLOQUE O NOME DO SEU ARQUIVO AQUI
            function (ifcModel) {
                document.getElementById('loading').style.display = 'none';
                scene.add(ifcModel);
            },
            function (progress) {
                const percentual = (progress.loaded / progress.total) * 100;
                document.getElementById('loading').innerText = `Carregando: ${Math.round(percentual)}%`;
            },
            function (error) {
                console.error("Erro ao carregar o IFC:", error);
                document.getElementById('loading').innerText = "Erro ao carregar. Verifique o console ou o nome do arquivo.";
            }
        );

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animar() {
            requestAnimationFrame(animar);
            orbit.update();
            renderer.render(scene, camera);
        }
        animar();
    </script>
</body>
</html>
