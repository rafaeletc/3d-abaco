<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador BIM (That Open) - 100% Funcional</title>
    
    <link rel="icon" href="data:,">

    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; display: block; }
        #loading { 
            position: absolute; top: 50%; width: 100%; text-align: center; 
            color: white; font-size: 18px; pointer-events: none; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            margin-top: 15px; width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three",
                "@thatopen/components": "https://esm.sh/@thatopen/components?external=three",
                "@thatopen/fragments": "https://esm.sh/@thatopen/fragments?external=three",
                "web-ifc": "https://esm.sh/web-ifc@0.0.70"
            }
        }
    </script>
</head>
<body>
    <div id="loading">
        <span id="loading-text">1. Iniciando Motor BIM...</span>
        <div class="spinner" id="spinner"></div>
    </div>
    
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import * as OBC from '@thatopen/components';

        const loadingText = document.getElementById('loading-text');
        const spinner = document.getElementById('spinner');

        async function iniciarAplicacao() {
            try {
                loadingText.innerText = "2. Configurando Cena 3D...";
                const container = document.getElementById('container');
                const components = new OBC.Components();
                const worlds = components.get(OBC.Worlds);
                
                const world = worlds.create();
                world.scene = new OBC.SimpleScene(components);
                world.scene.setup(); 
                world.scene.three.background = new THREE.Color('#cbd5e1');

                world.renderer = new OBC.SimpleRenderer(components, container);
                world.camera = new OBC.SimpleCamera(components);
                world.camera.controls.setLookAt(15, 15, 15, 0, 0, 0);

                components.init();

                // ==============================================================
                // PASSO NOVO E OBRIGATÓRIO: Inicializando o Motor de Geometria (Web Worker)
                // ==============================================================
                loadingText.innerText = "3. Inicializando Motor de Fragmentos (Worker)...";
                const fragments = components.get(OBC.FragmentsManager);
                
                // Baixamos o processador assíncrono oficial e transformamos em um link local
                const workerRequest = await fetch("https://thatopen.github.io/engine_fragment/resources/worker.mjs");
                const workerBlob = await workerRequest.blob();
                const workerUrl = URL.createObjectURL(workerBlob);
                
                // Agora inicializamos os fragmentos com o "trabalhador" configurado
                fragments.init(workerUrl);

                // ==============================================================

                loadingText.innerText = "4. Carregando Tradutor IFC (WASM)...";
                const ifcLoader = components.get(OBC.IfcLoader);
                await ifcLoader.setup(); 
                
                ifcLoader.settings.wasm = {
                    path: "https://unpkg.com/web-ifc@0.0.70/",
                    absolute: true
                };

                // LENDO O SEU ARQUIVO IFC
                const fileName = "./meu_projeto.ifc"; // <-- SEU ARQUIVO AQUI

                loadingText.innerText = `5. Baixando o arquivo ${fileName}...`;
                
                const response = await fetch(fileName + "?v=" + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error(`Arquivo IFC não encontrado! Erro ${response.status}. Verifique o nome do arquivo.`);
                }
                
                const data = await response.arrayBuffer();
                const buffer = new Uint8Array(data);

                loadingText.innerText = "6. Convertendo e Renderizando Geometria...";
                
                const model = await ifcLoader.load(buffer);
                world.scene.three.add(model);

                // Faz a câmera voar até o modelo suavemente
                world.camera.controls.fitToSphere(model, true);

                // Esconde o carregamento e libera a interação!
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error("Erro fatal capturado:", error);
                spinner.style.display = 'none';
                loadingText.innerText = `⚠️ Erro: ${error.message}`;
                loadingText.style.color = "#ff4757";
            }
        }

        iniciarAplicacao();
    </script>
</body>
</html>
