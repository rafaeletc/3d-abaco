<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador BIM Oficial (That Open)</title>
    
    <link rel="icon" href="data:,">

    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; display: block; }
        #loading { 
            position: absolute; top: 50%; width: 100%; text-align: center; 
            color: white; font-size: 18px; pointer-events: none; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            margin-top: 15px; width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <!-- 
      IMPORT MAP OFICIAL:
      Sem "mágicas" de compilação. Apontando para os arquivos puros e definitivos.
      Isso elimina a duplicação de classes e os bugs de "Fragments first".
    -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.58/web-ifc-api.js",
                "@thatopen/components": "https://cdn.jsdelivr.net/npm/@thatopen/components@1.4.1/dist/index.js"
            }
        }
    </script>
</head>
<body>
    <div id="loading">
        <span id="loading-text">1. Carregando Motor BIM Oficial...</span>
        <div class="spinner" id="spinner"></div>
    </div>
    
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import * as OBC from '@thatopen/components';

        const loadingText = document.getElementById('loading-text');
        const spinner = document.getElementById('spinner');

        async function iniciarAplicacao() {
            try {
                loadingText.innerText = "2. Configurando Mundo 3D...";
                const container = document.getElementById('container');
                const components = new OBC.Components();
                const worlds = components.get(OBC.Worlds);
                
                const world = worlds.create();
                world.scene = new OBC.SimpleScene(components);
                world.scene.setup(); 
                world.scene.three.background = new THREE.Color('#cbd5e1');

                world.renderer = new OBC.SimpleRenderer(components, container);
                world.camera = new OBC.SimpleCamera(components);
                world.camera.controls.setLookAt(15, 15, 15, 0, 0, 0);

                // Inicializamos a base primeiro
                components.init();

                // Como não há mais "módulos duplicados", ao chamar os Fragmentos aqui, 
                // o sistema reconhece a mesma cópia perfeitamente!
                const fragments = components.get(OBC.FragmentsManager);
                const ifcLoader = components.get(OBC.IfcLoader);

                loadingText.innerText = "3. Preparando Leitor IFC (WASM)...";
                await ifcLoader.setup(); 
                
                // Apontamos para o diretório exato dos binários de engenharia
                ifcLoader.settings.wasm = {
                    path: "https://cdn.jsdelivr.net/npm/web-ifc@0.0.58/",
                    absolute: true
                };

                // LENDO O SEU ARQUIVO IFC
                const fileName = "./meu_projeto.ifc"; // <-- NOME DO SEU ARQUIVO AQUI

                loadingText.innerText = `4. Baixando o arquivo ${fileName}...`;
                const response = await fetch(fileName + "?v=" + Date.now());
                
                if (!response.ok) {
                    throw new Error(`Arquivo IFC não encontrado! Erro HTTP: ${response.status}.`);
                }
                
                const data = await response.arrayBuffer();
                const buffer = new Uint8Array(data);

                loadingText.innerText = "5. Renderizando Geometria na Tela...";
                const model = await ifcLoader.load(buffer);
                world.scene.three.add(model);

                // Centraliza a câmera no projeto
                world.camera.controls.fitToSphere(model, true);

                // Oculta a tela de carregamento
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error("Erro fatal capturado:", error);
                spinner.style.display = 'none';
                loadingText.innerText = `⚠️ Erro: ${error.message}`;
                loadingText.style.color = "#ff4757";
            }
        }

        iniciarAplicacao();
    </script>
</body>
</html>
