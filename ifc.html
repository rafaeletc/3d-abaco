<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador BIM (That Open) - GitHub Pages</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; display: block; }
        #loading { 
            position: absolute; top: 50%; width: 100%; text-align: center; 
            color: white; font-size: 18px; pointer-events: none; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            margin-top: 15px; width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <!-- IMPORTMAP ROBUSTO PARA GITHUB PAGES (usando jsDelivr + esm) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "@thatopen/components": "https://cdn.jsdelivr.net/npm/@thatopen/components@1.4.1/+esm",
                "@thatopen/fragments": "https://cdn.jsdelivr.net/npm/@thatopen/fragments@1.4.1/+esm",
                "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.58/+esm"
            }
        }
    </script>
</head>
<body>
    <div id="loading">
        <span id="loading-text">Iniciando Motor BIM...</span>
        <div class="spinner" id="spinner"></div>
    </div>
    
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import * as OBC from '@thatopen/components';

        const loadingText = document.getElementById('loading-text');

        // 1. INICIALIZA O MOTOR THAT OPEN
        loadingText.innerText = "Configurando Cena 3D...";
        const container = document.getElementById('container');
        const components = new OBC.Components();
        const worlds = components.get(OBC.Worlds);
        
        const world = worlds.create();
        world.scene = new OBC.SimpleScene(components);
        world.scene.setup(); 
        world.scene.three.background = new THREE.Color('#cbd5e1');

        world.renderer = new OBC.SimpleRenderer(components, container);
        world.camera = new OBC.SimpleCamera(components);
        world.camera.controls.setLookAt(15, 15, 15, 0, 0, 0);

        components.init();

        // 2. CONFIGURA O TRADUTOR DE ENGENHARIA (WASM)
        loadingText.innerText = "Carregando Tradutor IFC (WASM)...";
        const ifcLoader = components.get(OBC.IfcLoader);
        await ifcLoader.setup(); 
        
        // Apontamos para o diretório de arquivos brutos do jsDelivr
        ifcLoader.settings.wasm = {
            path: "https://cdn.jsdelivr.net/npm/web-ifc@0.0.58/",
            absolute: true
        };

        // 3. LENDO O SEU ARQUIVO
        // IMPORTANTE: Use "./" no começo para forçar o GitHub a procurar na mesma pasta
        const fileName = "./meu_projeto.ifc"; 

        async function carregarModeloIFC() {
            try {
                loadingText.innerText = `Baixando o arquivo ${fileName}...`;
                
                // Puxa o arquivo do seu repositório do GitHub
                const response = await fetch(fileName);
                
                // Se o GitHub não encontrar o arquivo, ele avisa aqui
                if (!response.ok) {
                    throw new Error(`Arquivo não encontrado! (Erro HTTP: ${response.status}). Verifique o nome do arquivo.`);
                }
                
                const data = await response.arrayBuffer();
                const buffer = new Uint8Array(data);

                loadingText.innerText = "Processando Geometria...";
                
                // Converte e joga na tela
                const model = await ifcLoader.load(buffer);
                world.scene.three.add(model);

                // Sucesso! Esconde a tela de carregamento
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error(error);
                document.getElementById('spinner').style.display = 'none';
                loadingText.innerText = `⚠️ Erro: ${error.message}`;
                loadingText.style.color = "#ff4757";
            }
        }

        carregarModeloIFC();
    </script>
</body>
</html>
